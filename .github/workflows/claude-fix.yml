# Claude Code — Automated Bug Fix, Deploy & Code Assistance
#
# HOW IT WORKS:
# 1. Mention @claude in any issue body, issue comment, or PR review
# 2. Claude reads the context, explores the codebase, and implements a fix
# 3. Claude creates a PR, verifies the build passes, and auto-merges it
# 4. Netlify auto-deploys from main — the fix goes live in ~2 minutes
# 5. You verify on the live site and close the issue
#    — If something's wrong, click "Revert" on the PR to instantly roll back
#
# EXAMPLES:
#   Issue body:    "The blog cards are unstyled after load more. @claude"
#   Issue comment: "@claude this is a CSS scoping issue, check the blog index"
#   PR review:     "@claude can you fix the linting errors?"
#
# SAFETY:
# - Every change goes through a PR (auditable, revertible)
# - Build must pass before merge (Astro build = validation)
# - Netlify preview URL is available on the PR before merge
# - One-click revert if anything goes wrong post-deploy

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Image tools for OG images, favicons, screenshots, etc.
      # rsvg-convert: SVG → PNG/JPEG conversion
      # imagemagick: resize, composite, format conversion
      - name: Install image tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin imagemagick > /dev/null 2>&1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          # gh CLI uses this token for PR creation and merging
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          claude_args: |
            --model claude-sonnet-4-20250514
            --allowedTools "Bash(npm run build),Bash(git *),Bash(gh pr *),Bash(gh issue *),Bash(rsvg-convert *),Bash(convert *),Bash(file *),Bash(ls *),Read,Write,Edit,Glob,Grep"
            --system-prompt "After fixing a bug, you MUST complete the full deploy cycle: 1) Run npm run build to validate. 2) git checkout -b fix/issue-NUMBER, git add, git commit with a descriptive message. 3) git push -u origin fix/issue-NUMBER. 4) Create a PR: gh pr create --base main --title 'Fix: description' --body 'Closes #NUMBER' --head fix/issue-NUMBER. 5) Immediately merge it: gh pr merge --squash --delete-branch (do NOT use --auto flag). 6) Comment on the issue confirming the fix is merged and deploying. Follow CLAUDE.md conventions. Only change what is necessary."
