# Claude Code — Automated Bug Fix & Code Assistance
#
# HOW IT WORKS:
# 1. Mention @claude in any issue body, issue comment, or PR review
# 2. Claude reads the context, explores the codebase, and responds
# 3. For bugs: it creates a fix branch and opens a PR
# 4. For questions: it comments with an answer
# 5. You review and merge — nothing ships without your approval
#
# EXAMPLES:
#   Issue body:    "The blog cards are unstyled after load more. @claude"
#   Issue comment: "@claude this is a CSS scoping issue, check the blog index"
#   PR review:     "@claude can you fix the linting errors?"
#
# SETUP:
# 1. Install Claude GitHub App: https://github.com/apps/claude
# 2. Add ANTHROPIC_API_KEY to repo secrets
# 3. This workflow handles the rest

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Use Sonnet for speed + cost efficiency on bug fixes
          # Switch to opus for complex architectural issues
          claude_args: |
            --model claude-sonnet-4-20250514
            --allowedTools "Bash(npm run build),Bash(npm run dev),Read,Write,Edit,Glob,Grep"
