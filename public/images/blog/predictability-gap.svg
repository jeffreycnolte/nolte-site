<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
<rect width="640" height="360" fill="#050505"/>
<!-- Subtle grid -->
<line x1="60" y1="300" x2="580" y2="300" stroke="rgba(255,255,255,0.06)"/>
<line x1="60" y1="220" x2="580" y2="220" stroke="rgba(255,255,255,0.06)"/>
<line x1="60" y1="140" x2="580" y2="140" stroke="rgba(255,255,255,0.06)"/>
<!-- Estimate line - erratic -->
<polyline points="80,200 150,280 220,130 300,290 380,150 460,270 540,120" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-dasharray="8,6"/>
<!-- Forecast confidence band -->
<polygon points="80,205 150,198 220,192 300,186 380,181 460,176 540,172 540,208 460,212 380,217 300,222 220,228 150,232 80,235" fill="rgba(214,63,24,0.08)"/>
<!-- Forecast line - steady -->
<polyline points="80,220 150,215 220,210 300,204 380,199 460,194 540,190" fill="none" stroke="#D63F18" stroke-width="3"/>
<!-- Labels -->
<text x="540" y="110" font-size="14" fill="rgba(255,255,255,0.15)" font-family="monospace" text-anchor="end">estimate</text>
<text x="540" y="182" font-size="14" fill="rgba(214,63,24,0.7)" font-family="monospace" text-anchor="end">forecast</text>
</svg>
