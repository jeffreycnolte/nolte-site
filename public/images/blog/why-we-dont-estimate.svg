<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
<rect width="640" height="360" fill="#050505"/>
<!-- Axis -->
<line x1="60" y1="300" x2="580" y2="300" stroke="rgba(255,255,255,0.08)"/>
<!-- Bars - bell curve distribution -->
<rect x="80" y="260" width="50" height="40" fill="rgba(214,63,24,0.12)"/>
<rect x="140" y="220" width="50" height="80" fill="rgba(214,63,24,0.18)"/>
<rect x="200" y="150" width="50" height="150" fill="rgba(214,63,24,0.3)"/>
<rect x="260" y="90" width="50" height="210" fill="rgba(214,63,24,0.55)"/>
<rect x="320" y="70" width="50" height="230" fill="#D63F18" opacity="0.75"/>
<rect x="380" y="110" width="50" height="190" fill="rgba(214,63,24,0.45)"/>
<rect x="440" y="180" width="50" height="120" fill="rgba(214,63,24,0.25)"/>
<rect x="500" y="250" width="50" height="50" fill="rgba(214,63,24,0.12)"/>
<!-- P50 line -->
<line x1="345" y1="55" x2="345" y2="300" stroke="rgba(214,63,24,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
<!-- Labels -->
<text x="345" y="45" font-size="14" fill="rgba(214,63,24,0.7)" font-family="monospace" text-anchor="middle">p50: 4.8 days</text>
<text x="320" y="330" font-size="13" fill="rgba(255,255,255,0.2)" font-family="monospace" text-anchor="middle">cycle time distribution</text>
</svg>
